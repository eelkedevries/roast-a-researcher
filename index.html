<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#100e0c" />
    <meta
      name="description"
      content="Comedic roast generator for academic profiles — paste your own academic profile and have it roasted."
    />
    <!-- Speed up the first call to the Worker (cross-origin DNS+TLS+TCP). Keep in sync with workerUrl in src/config.ts. -->
    <link rel="preconnect" href="https://roast-a-researcher.eelkedevries.workers.dev" crossorigin />
    <!-- Fonts via <link> (not a CSS @import) so the fetch starts in parallel with CSS parsing. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap"
    />
    <!-- Open Graph / Twitter: rich preview when the page URL is shared (independent of noindex). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Roast a Researcher" />
    <meta property="og:title" content="Roast a Researcher" />
    <meta
      property="og:description"
      content="Comedic roast generator for academic profiles — paste your own academic profile and have it roasted."
    />
    <meta property="og:url" content="https://eelkedevries.github.io/roast-a-researcher/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Roast a Researcher" />
    <meta
      name="twitter:description"
      content="Comedic roast generator for academic profiles — paste your own academic profile and have it roasted."
    />
    <title>Roast a Researcher</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
