name = "roast-a-researcher"
main = "src/index.ts"
compatibility_date = "2026-06-05"

# Bundle roast.md (the single config + prompt file) as a Text module so src/index.ts
# can import it as a string and split its YAML frontmatter from the prompt body. The
# model, parameters and instructions all live in that one file, not in the code.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# Non-secret configuration (committed). Secrets (OPENROUTER_API_KEY) are set with
# `wrangler secret put` for the deployed Worker, or in worker/.dev.vars
# (git-ignored) for local `wrangler dev`.
[vars]
ALLOW_ORIGIN = "https://eelkedevries.github.io"
MAX_INPUT_CHARS = "40000"
DAILY_LIMIT = "50"
# Per-IP daily cap on the /retrieve and /search endpoints — separate from and more
# generous than DAILY_LIMIT, since one roast legitimately issues several lookups.
# Bounds open-proxy scraping and API-key burn. Default 300 when unset.
RETRIEVE_DAILY_LIMIT = "300"
# Contact for the OpenAlex "polite pool" — steadier per-contact rate limits than
# the shared common pool (which a Cloudflare egress IP can exhaust). Any contact
# string works; change it to a real inbox you prefer.
OPENALEX_MAILTO = "eelkedevries@users.noreply.github.com"
# How long (seconds) to cache a public-record retrieval in KV (018). Public
# records change slowly; this caps repeat external API calls and cost. The roast
# and any user-pasted text are never cached. Default 24h.
RETRIEVE_CACHE_TTL = "86400"

# ORCID login (033–035): optional "Log in with ORCID" that marks the logged-in
# researcher's profile as verified for the current session only (no database).
# These four are non-secret and public by OAuth design; the two secrets
# (ORCID_CLIENT_SECRET, SESSION_SECRET) are set with `wrangler secret put`.
# ORCID_OAUTH_BASE is the production host; use https://sandbox.orcid.org to test
# against the sandbox (a separate account namespace). The client ID and redirect
# URI come from your registered ORCID app; the redirect URI must exactly match
# the Worker's /auth/orcid/callback path.
ORCID_OAUTH_BASE = "https://orcid.org"
ORCID_CLIENT_ID = "APP-ILUQFY2R5DFRQLKU"
ORCID_REDIRECT_URI = "https://roast-a-researcher.eelkedevries.workers.dev/auth/orcid/callback"
# Where to send the browser back to after a successful login (the Pages app).
APP_URL = "https://eelkedevries.github.io/roast-a-researcher/"

# Per-IP daily rate-limit counter (key: rl:<UTC-date>:<hashed-ip>, TTL = end of day).
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "dd12e320b09a4210a53114a0c9a1ef59"
