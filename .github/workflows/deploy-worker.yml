# Deploys the Cloudflare Worker (worker/) with wrangler, so a deploy needs no
# local machine: it runs on push to main when worker code changes, or on manual
# dispatch from the Actions tab. Authentication is via two repository secrets,
# CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID; the front end deploys separately
# through deploy-pages.yml.
#
# The OpenAlex API key is re-applied on every deploy from the OPENALEX_API_KEY
# repository secret (a dashboard-set Worker secret does not survive `wrangler
# deploy`, so it must be set through CI to persist). OPENROUTER_API_KEY and
# IP_HASH_SALT are managed separately via `wrangler secret put` and are untouched.
name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy Worker
        working-directory: worker
        run: npx --yes wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply OpenAlex API key (persists across deploys)
        working-directory: worker
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$OPENALEX_API_KEY" ]; then
            printf '%s' "$OPENALEX_API_KEY" | npx --yes wrangler@4 secret put OPENALEX_API_KEY
            echo "OpenAlex key applied."
          else
            echo "OPENALEX_API_KEY repo secret not set; skipping (OpenAlex will 429)."
          fi
