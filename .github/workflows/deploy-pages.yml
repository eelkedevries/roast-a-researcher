# Node/static-site template workflow.
# Builds the static site and deploys it to GitHub Pages from this repository.
# Adapt or replace for non-Node project types.
#
# Required setup after copying into a project (one-time):
# - Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# - The repository must be public on GitHub Free; GitHub Pages for a
#   private repository requires a paid plan.
# No personal access token is needed: deployment uses the built-in GITHUB_TOKEN
# and the Pages permissions below.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: bash scripts/check-public-build.sh dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
